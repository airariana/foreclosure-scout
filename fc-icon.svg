<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Rounded square dark tile -->
  <rect width="192" height="192" rx="28" fill="#0E1728"/>

  <!-- Magnifying glass: lens circle + handle -->
  <!-- Gold-accent ring outside -->
  <circle cx="82" cy="82" r="58" fill="none" stroke="#D4A93A" stroke-width="6"/>

  <!-- Lens interior: warm paper tone so house reads cleanly -->
  <circle cx="82" cy="82" r="52" fill="#FAF8F3"/>

  <!-- Inside the lens: minimalist house -->
  <g transform="translate(82, 82)">
    <!-- Roof (triangle) -->
    <polygon points="-28,-2 0,-28 28,-2" fill="#0E1728"/>
    <!-- House body -->
    <rect x="-24" y="-2" width="48" height="32" fill="#0E1728"/>
    <!-- Door (gold accent, echoes the ring) -->
    <rect x="-6" y="10" width="12" height="20" fill="#D4A93A"/>
    <!-- Windows -->
    <rect x="-19" y="4" width="9" height="9" fill="#FAF8F3"/>
    <rect x="10" y="4" width="9" height="9" fill="#FAF8F3"/>
  </g>

  <!-- Magnifying glass handle -->
  <rect x="128" y="128" width="14" height="48" rx="6" fill="#D4A93A"
        transform="rotate(45, 135, 152)"/>
</svg>
