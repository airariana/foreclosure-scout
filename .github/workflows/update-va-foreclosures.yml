name: Update VA Foreclosures

on:
  schedule:
    # Every Monday at 6 AM EST (11 AM UTC)
    - cron: '0 11 * * 1'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install --break-system-packages -r scraper/requirements.txt

    - name: Install Playwright browsers
      run: |
        python3 -m playwright install --with-deps chromium

    - name: Run VA foreclosure scraper
      env:
        GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        RENTCAST_API_KEY: ${{ secrets.RENTCAST_API_KEY }}
        # Hard kill-switch: prevent any RentCast API billing after the
        # user's subscription was removed. Cache-only mode still applies
        # already-cached enrichment to properties that were seen before,
        # so the 227 existing enriched records keep their data. Flip to
        # "0" (or remove) if the subscription is ever reinstated.
        SKIP_RENTCAST: "1"
      run: |
        python3 scraper/va_foreclosure_scraper.py

    - name: Commit and push if changed
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/foreclosures_va.json data/enrichment_cache.json data/enrichment_retry.json

        # Only commit if there are changes
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🤖 Auto-update: Virginia foreclosures - $(date +'%Y-%m-%d')"
          git push
        fi
