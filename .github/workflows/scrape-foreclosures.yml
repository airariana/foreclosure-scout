name: Scrape Virginia Foreclosures

on:
  schedule:
    # Run every Monday at 6 AM UTC (1 AM EST)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ main ]
    paths:
      - 'scraper/**'
      - '.github/workflows/scrape-foreclosures.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pdfplumber
    
    - name: Run Virginia foreclosure scraper
      env:
        GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      run: |
        cd scraper
        python va_foreclosure_scraper.py
        # Move output to data directory
        mv foreclosures_va.json ../data/foreclosures_va.json
    
    - name: Commit and push data
      run: |
        git config user.name "Foreclosure Scout Bot"
        git config user.email "bot@foreclosure-scout.com"
        git add data/foreclosures_va.json
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update Virginia foreclosures - $(date +'%Y-%m-%d %H:%M')"
          git push
        fi
    
    - name: Create summary
      if: always()
      run: |
        echo "### Scrape Results" >> $GITHUB_STEP_SUMMARY
        echo "- **Date**: $(date)" >> $GITHUB_STEP_SUMMARY
        if [ -f data/foreclosures_va.json ]; then
          COUNT=$(jq '.metadata.total_properties' data/foreclosures_va.json)
          echo "- **Properties Found**: $COUNT" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Status**: Failed to generate data" >> $GITHUB_STEP_SUMMARY
        fi


